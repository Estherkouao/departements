<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - </title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'deep-black': '#1A1A1A',
                        'gold': '#FFD700',
                        'gold-darker': '#B8860B',
                        'soft-white': '#F5F5F5',
                        'card-bg': '#262626',
                    },
                    fontFamily: {
                        display: ['Outfit', 'Montserrat', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #1A1A1A;
            color: #FFFFFF;
        }
        .glass-card {
            background: rgba(38, 38, 38, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 215, 0, 0.2);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="w-20 h-20 mx-auto bg-gradient-to-br from-yellow-400 to-yellow-600 rounded-full flex items-center justify-center text-deep-black font-bold text-3xl mb-4 shadow-lg shadow-yellow-500/30">
            </div>
            <h1 class="text-3xl font-display font-black text-white">
                ORGANISATION <span class="text-gold">DES DÉPARTEMENTS</span>
            </h1>
            <p class="text-gray-400 mt-2"> - Créer un compte</p>
        </div>

        <!-- Registration Form -->
        <div class="glass-card rounded-3xl p-8">
            <h2 class="text-2xl font-display font-bold text-center mb-6">Créer un compte</h2>
            
            {% if messages %}
            <div class="mb-4">
                {% for message in messages %}
                <div class="p-3 rounded-lg mb-2 {% if message.tags == 'error' %}bg-red-900/50 text-red-400 border border-red-500/30{% else %}bg-green-900/50 text-green-400 border border-green-500/30{% endif %}">
                    {{ message }}
                </div>
                {% endfor %}
            </div>
            {% endif %}
            
            <form method="POST" class="space-y-4">
                {% csrf_token %}
                
                <div>
                    <label class="block text-xs font-bold text-gold uppercase mb-2">Nom d'utilisateur</label>
                    <input type="text" name="username" required 
                        class="w-full p-3 rounded-xl bg-white/5 border border-gray-700 text-white focus:border-gold focus:outline-none transition-colors"
                        placeholder="Choix d'un nom d'utilisateur">
                </div>
                
                <div>
                    <label class="block text-xs font-bold text-gold uppercase mb-2">Email</label>
                    <input type="email" name="email" required 
                        class="w-full p-3 rounded-xl bg-white/5 border border-gray-700 text-white focus:border-gold focus:outline-none transition-colors"
                        placeholder="votre@email.com">
                </div>
                
                <div>
                    <label class="block text-xs font-bold text-gold uppercase mb-2">Mot de passe</label>
                    <input type="password" name="password" required 
                        class="w-full p-3 rounded-xl bg-white/5 border border-gray-700 text-white focus:border-gold focus:outline-none transition-colors"
                        placeholder="••••••••">
                </div>
                
                <div>
                    <label class="block text-xs font-bold text-gold uppercase mb-2">Confirmer le mot de passe</label>
                    <input type="password" name="password_confirm" required 
                        class="w-full p-3 rounded-xl bg-white/5 border border-gray-700 text-white focus:border-gold focus:outline-none transition-colors"
                        placeholder="••••••••">
                </div>
                
                <div class="pt-2">
                    <label class="flex items-start text-gray-400 text-sm">
                        <input type="checkbox" required class="mt-1 mr-2 rounded bg-white/5 border-gray-700">
                        <span>J'accepte les <a href="#" class="text-gold hover:underline">conditions d'utilisation</a> et la <a href="#" class="text-gold hover:underline">politique de confidentialité</a></span>
                    </label>
                </div>
                
                <button type="submit" 
                    class="w-full py-4 bg-gradient-to-r from-yellow-500 to-yellow-600 text-deep-black font-extrabold rounded-xl hover:shadow-lg hover:shadow-yellow-500/40 transition-all transform hover:scale-[1.02]">
                    CRÉER MON COMPTE
                </button>
            </form>
            
            <div class="mt-6 text-center">
                <p class="text-gray-400 text-sm">Déjà inscrit? 
                    <a href="{% url 'connexion' %}" class="text-gold font-bold hover:text-gold-darker transition-colors">Se connecter</a>
                </p>
            </div>
        </div>
        
        <!-- Back to Home -->
        <div class="text-center mt-6">
            <a href="{% url 'departement' %}" class="text-gray-500 hover:text-gold text-sm transition-colors">
                ← Retour à l'accueil
            </a>
        </div>
    </div>
</body>
</html>
